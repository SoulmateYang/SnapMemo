spring:
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:aibrief}?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:123456}
  flyway:
    enabled: true
    locations: classpath:db/migration

mybatis:
  mapper-locations: classpath:mapper/*.xml
  configuration:
    map-underscore-to-camel-case: true

server:
  port: 8090

ai:
  api-key: ${AI_API_KEY:your-api-key}
  api-url: ${AI_API_URL:https://dashscope.aliyuncs.com/compatible-mode/v1/chat/completions}
  model: ${AI_MODEL:qvq-max-2025-03-25}
  connect-timeout-ms: 5000
  read-timeout-ms: 30000
  request-delay-ms: 200

briefing:
  trigger-token: ${BRIEFING_TRIGGER_TOKEN:dev-token}

logging:
  level:
    com.aibrief: INFO
